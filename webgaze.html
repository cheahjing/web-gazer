<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bird Study: 9-Dot Fish Game</title>
    <script src="https://cdn.jsdelivr.net/npm/webgazer@2.1.1/dist/webgazer.min.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #e0f7fa; font-family: 'Comic Sans MS', cursive, sans-serif; overflow: hidden; }
        
        #app-viewport {
            position: relative; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #stage {
            position: relative; width: 85%; height: 80%;
            background: #ffffff; border: 8px solid #4fc3f7; border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 10; overflow: hidden;
        }

        /* WEBCAM: Elevated to the absolute top of the stack */
        #webgazerVideoFeed {
            display: block !important;
            position: fixed !important;
            bottom: 20px !important;
            left: 20px !important;
            top: auto !important;
            width: 200px !important;
            height: auto !important;
            z-index: 2147483647 !important; /* Maximum possible Z-index */
            border: 4px solid #fff;
            border-radius: 15px;
            transform: scaleX(-1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Target Point Styling */
        .fish-target {
            position: absolute; width: 60px; height: 60px; 
            cursor: pointer; z-index: 1000; transform: translate(-50%, -50%);
            display: flex; align-items: center; justify-content: center; font-size: 40px;
            transition: transform 0.1s;
        }
        .fish-distractor {
            position: absolute; width: 50px; height: 50px; 
            z-index: 999; transform: translate(-50%, -50%);
            display: flex; align-items: center; justify-content: center; font-size: 30px;
            opacity: 0.6; pointer-events: none;
        }

        #game-instr {
            position: absolute; top: 15px; width: 100%; text-align: center;
            font-size: 22px; color: #01579b; z-index: 1100;
        }

        #debug-bar {
            position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.85);
            color: white; padding: 10px 20px; z-index: 2147483646; display: flex; gap: 30px; font-family: monospace;
        }
        .status-on { color: #00ff00; font-weight: bold; }
        .status-off { color: #ff4444; font-weight: bold; }

        #overlay {
            position: fixed; inset: 0; background: #e1f5fe;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2147483645;
        }
    </style>
</head>

<body>

<div id="debug-bar">
    <span>PID: <span id="disp-pid"></span></span>
    <span>Screen: <span id="disp-screen">--</span></span>
    <button onclick="finishSession()" style="margin-left:auto; cursor:pointer;">Stop & Save</button>
</div>

<div id="app-viewport">
    <div id="stage">
        <div id="game-area" style="display:none; width:100%; height:100%; background:#b3e5fc; position:relative;">
            <div id="game-instr">Click the <b>RED APPLE 🍎</b> 3 times at every spot!</div>
        </div>
        
        <div id="video-area" style="display:none; width:100%; height:100%;">
            <div id="player"></div>
        </div>
    </div>

    <div id="overlay">
        <h1>🐦 Ready to find the birds?</h1>
        <p>Click the button to start the game!</p>
        <button onclick="initExperience()" style="padding:20px 60px; font-size:1.5rem; cursor:pointer; background:#ff7043; color:white; border:none; border-radius:50px;">Start!</button>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const PID = params.get("pid") || "P001";
    const YT_ID = params.get("yt") || "905QNpTukIU";
    document.getElementById('disp-pid').innerText = PID;

    let csvData = [["timestamp", "event", "video_time", "norm_x", "norm_y", "on_screen"]];
    let currentGaze = { x: 0, y: 0 };
    let player = null;
    let isRecording = false;

    // 9-Point Grid Coordinates (%)
    const points = [
        [15, 15], [50, 15], [85, 15],
        [15, 50], [50, 50], [85, 50],
        [15, 85], [50, 85], [85, 85]
    ];
    let currentPointIndex = 0;
    let clickCount = 0;

    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
    window.onYouTubeIframeAPIReady = () => {
        player = new YT.Player('player', {
            videoId: YT_ID,
            playerVars: { controls: 0, disablekb: 1, modestbranding: 1, rel: 0 }
        });
    };

    async function initExperience() {
        document.getElementById('overlay').style.display = 'none';
        
        await webgazer.setRegression('ridge')
            .setGazeListener((data) => {
                if (!data) return;
                currentGaze = { x: data.x, y: data.y };
                updateSystem();
            }).begin();

        webgazer.showVideo(true).showPredictionPoints(true);
        startCalibrationGame();
    }

    function startCalibrationGame() {
        document.getElementById('game-area').style.display = 'block';
        spawnPoint();
    }

    function spawnPoint() {
        const area = document.getElementById('game-area');
        area.querySelectorAll('.fish-target, .fish-distractor').forEach(el => el.remove());

        if (currentPointIndex >= points.length) {
            area.style.display = 'none';
            startVideo();
            return;
        }

        const [x, y] = points[currentPointIndex];

        // 1. Create Distractors (Blue drops) around the target
        for (let i = 0; i < 6; i++) {
            const d = document.createElement('div');
            d.className = 'fish-distractor';
            d.innerHTML = '💧';
            d.style.left = (x + (Math.random() * 20 - 10)) + "%";
            d.style.top = (y + (Math.random() * 20 - 10)) + "%";
            area.appendChild(d);
        }

        // 2. Create Target (Red Apple)
        const t = document.createElement('div');
        t.className = 'fish-target';
        t.innerHTML = '🍎';
        t.style.left = x + "%";
        t.style.top = y + "%";
        
        t.onclick = () => {
            clickCount++;
            if (clickCount >= 3) {
                clickCount = 0;
                currentPointIndex++;
                spawnPoint();
            } else {
                t.style.transform = `translate(-50%, -50%) scale(${1 + clickCount * 0.3})`;
            }
        };
        area.appendChild(t);
    }

    function startVideo() {
        document.getElementById('video-area').style.display = 'block';
        player.playVideo();
        isRecording = true;

        setInterval(() => {
            if (isRecording) {
                const stageBox = document.getElementById('stage').getBoundingClientRect();
                const vTime = player.getCurrentTime ? player.getCurrentTime().toFixed(2) : 0;

                const normX = (currentGaze.x - stageBox.left) / stageBox.width;
                const normY = (currentGaze.y - stageBox.top) / stageBox.height;
                const onScreen = (currentGaze.x >= 0 && currentGaze.x <= window.innerWidth && 
                                  currentGaze.y >= 0 && currentGaze.y <= window.innerHeight) ? 1 : 0;

                csvData.push([new Date().toISOString(), "video", vTime, normX.toFixed(4), normY.toFixed(4), onScreen]);
            }
        }, 1000);
    }

    function updateSystem() {
        const onScreen = (currentGaze.x >= 0 && currentGaze.x <= window.innerWidth && 
                          currentGaze.y >= 0 && currentGaze.y <= window.innerHeight);
        const screenSpan = document.getElementById('disp-screen');
        screenSpan.innerText = onScreen ? "LOOKING AT SCREEN" : "OFF SCREEN";
        screenSpan.className = onScreen ? "status-on" : "status-off";
    }

    function finishSession() {
        isRecording = false;
        webgazer.pause();
        const csvContent = csvData.map(e => e.join(",")).join("\n");
        const blob = new Blob([csvContent], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `STUDY_${PID}.csv`; a.click();
    }
</script>

</body>
</html>
