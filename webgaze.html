<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gaze Logger - Final WebGazer</title>
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">
  <script src="https://webgazer.cs.brown.edu/webgazer.js"></script>

  <style>
    body { margin: 0; background: black; color: white; font-family: system-ui; overflow: hidden; }
    #layout { display: flex; width: 100vw; height: 100vh; }
    #videoPane { flex: 1; position: relative; background: #000; }
    #player { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
    #overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); z-index: 2000; text-align: center; }
    .calibration-point { position: absolute; width: 25px; height: 25px; background: #ff3355; border-radius: 50%; cursor: pointer; border: 3px solid white; display: none; z-index: 3000; transform: translate(-50%, -50%); }
    #debug { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; font-size: 12px; border-radius: 8px; z-index: 900; pointer-events: none; }
    #stopBtn { position: absolute; top: 20px; right: 20px; background: #ff3355; color: white; padding: 12px 20px; border: none; border-radius: 6px; display: none; z-index: 2500; font-weight: bold; cursor: pointer; }
  </style>
</head>

<body>
  <div id="layout">
    <div id="videoPane">
      <div id="player"></div>
      <div id="overlay">
        <div id="setupContent">
          <h2>WebGazer Comparison Tool</h2>
          <p>Allow camera access, then click Begin.<br>Click each red dot 5 times.</p>
          <button id="initBtn" style="padding:12px 24px; font-size:1.1em; cursor:pointer;">Begin Calibration</button>
        </div>
      </div>
      <button id="stopBtn">⏹ Stop & Save CSV</button>
      <div id="debug">Waiting for user...</div>
      
      <div class="calibration-point" id="pt1" style="top: 15%; left: 15%;"></div>
      <div class="calibration-point" id="pt2" style="top: 15%; left: 50%;"></div>
      <div class="calibration-point" id="pt3" style="top: 15%; left: 85%;"></div>
      <div class="calibration-point" id="pt4" style="top: 50%; left: 15%;"></div>
      <div class="calibration-point" id="pt5" style="top: 50%; left: 50%;"></div>
      <div class="calibration-point" id="pt6" style="top: 50%; left: 85%;"></div>
      <div class="calibration-point" id="pt7" style="top: 85%; left: 15%;"></div>
      <div class="calibration-point" id="pt8" style="top: 85%; left: 50%;"></div>
      <div class="calibration-point" id="pt9" style="top: 85%; left: 85%;"></div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const PID = params.get("pid") || "P001";
    const VID = params.get("vid") || "V01";
    const YT_ID = params.get("yt") || "";
    const SESSION_ID = "gazer_" + Date.now();

    let csvData = [["timestamp", "session_id", "participant_id", "video_id", "video_time", "gaze_x", "gaze_y", "on_screen"]];
    let player = null;
    let currentPoint = 1;
    let clicksOnPoint = 0;
    let currentGaze = { x: 0, y: 0 };
    let isTracking = false;

    // YouTube API
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
    window.onYouTubeIframeAPIReady = () => {
      player = new YT.Player('player', {
        videoId: YT_ID,
        playerVars: { controls: 0, disablekb: 1, rel: 0, playsinline: 1, modestbranding: 1 },
        events: { onStateChange: (e) => { if(e.data === YT.PlayerState.ENDED) finishSession(); } }
      });
    };

    document.getElementById('initBtn').onclick = async function() {
      this.disabled = true;
      document.getElementById('setupContent').innerHTML = "<h3>Initializing Tracker...</h3>";

      // IMPORTANT: If the script fails to find the worker files, 
      // we force the global variable before calling begin.
      window.WG_BASE_PATH = "https://cdn.jsdelivr.net/gh/brownhci/WebGazer/src/facemesh/";

      webgazer.setGazeListener((data, elapsedTime) => {
        if (data) {
          currentGaze = { x: data.x, y: data.y };
          updateDebug();
        }
      })
      .showVideoPreview(true)
      .showFaceOverlay(true)
      .showPredictionPoints(true)
      .begin()
      .then(() => {
        // Success callback: Check if config exists and update it if possible
        if (webgazer.params && webgazer.params.facemesh) {
           webgazer.params.facemesh.basePath = window.WG_BASE_PATH;
        }
        startCalibration();
      })
      .catch(err => {
        console.error("WebGazer failed:", err);
        alert("Init Error: Make sure camera is allowed.");
      });
    };

    function startCalibration() {
      document.getElementById('overlay').style.display = "none";
      showPoint(1);
    }

    function showPoint(id) {
      const pt = document.getElementById(`pt${id}`);
      if (pt) {
        pt.style.display = "block";
        pt.onclick = () => {
          clicksOnPoint++;
          if (clicksOnPoint >= 5) {
            pt.style.display = "none";
            clicksOnPoint = 0;
            currentPoint++;
            showPoint(currentPoint);
          } else {
            pt.style.background = (clicksOnPoint % 2 === 0) ? "#ff3355" : "#00ff88";
          }
        };
      } else {
        startRecording();
      }
    }

    function startRecording() {
      document.getElementById('stopBtn').style.display = "block";
      player.playVideo();
      isTracking = true;
      setInterval(() => {
        if (isTracking && player.getPlayerState() === 1) {
          const vTime = player.getCurrentTime();
          const onScreen = (currentGaze.x >= 0 && currentGaze.x <= window.innerWidth && 
                            currentGaze.y >= 0 && currentGaze.y <= window.innerHeight) ? 1 : 0;
          csvData.push([new Date().toISOString(), SESSION_ID, PID, VID, vTime.toFixed(3), Math.round(currentGaze.x), Math.round(currentGaze.y), onScreen]);
        }
      }, 1000);
    }

    function updateDebug() {
      const d = document.getElementById('debug');
      const vTime = (player && player.getCurrentTime) ? player.getCurrentTime().toFixed(2) : "0.00";
      d.innerHTML = `<b>PID:</b> ${PID}<br><b>X:</b> ${Math.round(currentGaze.x)} <b>Y:</b> ${Math.round(currentGaze.y)}<br><b>On Screen:</b> ${(currentGaze.x >= 0 && currentGaze.x <= window.innerWidth) ? "YES" : "NO"}`;
    }

    function finishSession() {
      if (!isTracking) return;
      isTracking = false;
      webgazer.pause();
      const csvContent = csvData.map(e => e.join(",")).join("\n");
      const blob = new Blob([csvContent], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `WG_${PID}_${VID}.csv`;
      a.click();
    }

    document.getElementById('stopBtn').onclick = finishSession;
  </script>
</body>
</html>
