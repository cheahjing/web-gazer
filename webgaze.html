<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bird Study: Research Grade Logger</title>
    <script src="https://cdn.jsdelivr.net/npm/webgazer@2.1.1/dist/webgazer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f8fbff; font-family: 'Comic Sans MS', cursive, sans-serif; overflow: hidden; }
        #app-viewport { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        #stage { position: relative; width: 85%; height: 80%; background: #ffffff; border: 8px solid #0077be; border-radius: 25px; z-index: 10; overflow: hidden; }
        #webgazerGazeDot { z-index: 2147483647 !important; border: 2px solid white !important; }
        .fish-target { position: absolute; display: flex !important; align-items: center; justify-content: center; width: 120px; height: 120px; transform: translate(-50%, -50%); font-size: 70px; z-index: 1000; transition: filter 0.2s, transform 0.2s; cursor: default; background: transparent !important; outline: none !important; user-select: none; }
        .fish-red { filter: grayscale(1) sepia(1) saturate(8) hue-rotate(-50deg); opacity: 0.7; }
        .fish-blue { filter: none; opacity: 1; cursor: pointer; }
        #boss-fish { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 140px; z-index: 1200; display: none; opacity: 0; pointer-events: none; }
        .boss-active { display: flex !important; opacity: 1 !important; }
        #countdown-overlay { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(255,255,255,0.8); z-index: 1500; font-size: 150px; color: #ff4444; font-weight: bold; }
        #victory-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border: 10px solid #ffd700; border-radius: 30px; padding: 40px; text-align: center; z-index: 2000; display: none; }
        #video-area, #player { width: 100%; height: 100%; }
        #debug-bar { position: fixed; top: 0; width: 100%; background: #333; color: white; padding: 10px 20px; z-index: 2147483646; display: flex; gap: 20px; font-family: monospace; font-size: 12px;}
        #overlay { position: fixed; inset: 0; background: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2147483645; text-align: center; }
        #camVideo { display: none; }
    </style>
</head>
<body>

<div id="debug-bar">
    <span>PID: <b id="disp-pid">--</b></span>
    <span>VID: <b id="disp-vid">--</b></span>
    <span>SESS: <b id="disp-sess">--</b></span>
    <button onclick="terminateSession()" style="margin-left:auto; cursor:pointer; background:#ff4444; color:white; border:none; padding:2px 10px; border-radius:4px;">⏹ Stop & Save</button>
</div>

<div id="app-viewport">
    <div id="stage">
        <div id="game-area" style="display:none; width:100%; height:100%; background:#ffffff; position:relative;">
            <div id="countdown-overlay">3</div>
            <div id="boss-fish">🦑</div>
            <div id="victory-modal">
                <div style="font-size: 100px;">🏆</div>
                <h2>CALIBRATION COMPLETE</h2>
                <p>Quality Score: <b id="final-fish-display">--</b>%</p>
                <button onclick="closeVictory()" style="padding: 15px 40px; background: #ffd700; border: none; border-radius: 20px; font-weight: bold; cursor: pointer;">WATCH BIRDS 🐦</button>
            </div>
        </div>
        <div id="video-area" style="display:none;"><div id="player"></div></div>
    </div>
    <div id="overlay">
        <h1>🌊 Research Session</h1>
        <p id="init-msg">Initializing Trackers...</p>
        <button id="startBtn" onclick="initExperience()" style="display:none; padding:20px 60px; font-size:1.5rem; cursor:pointer; background:#0077be; color:white; border:none; border-radius:50px; font-weight:bold;">START</button>
    </div>
</div>

<video id="camVideo" autoplay playsinline muted></video>

<script type="module">
    import { FaceDetector, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs";

    // --- SESSION ID GENERATOR ---
    function generateSessionId() {
        const now = new Date();
        const YYYY = now.getFullYear();
        const MM = String(now.getMonth() + 1).padStart(2, "0");
        const DD = String(now.getDate()).padStart(2, "0");
        const HH = String(now.getHours()).padStart(2, "0");
        const mm = String(now.getMinutes()).padStart(2, "0");
        const SS = String(now.getSeconds()).padStart(2, "0");
        const randomSuffix = String(Math.floor(Math.random() * 100)).padStart(2, "0");
        return `sess_${YYYY}${MM}${DD}_${HH}${mm}${SS}_${randomSuffix}`;
    }

    const params = new URLSearchParams(window.location.search);
    const PID = params.get("pid") || "P001";
    const VID = params.get("vid") || "V01";
    const YT_ID = params.get("yt") || "905QNpTukIU";
    const SESSION_ID = generateSessionId();

    document.getElementById('disp-pid').innerText = PID;
    document.getElementById('disp-vid').innerText = VID;
    document.getElementById('disp-sess').innerText = SESSION_ID;

    let csvData = [["timestamp", "session_id", "participant_id", "video_id", "youtube_id", "video_time", "gaze_x", "gaze_y", "on_screen", "face_detected", "face_centered", "face_count", "face_width", "face_height", "detection_confidence", "head_symmetry"]];
    let currentGaze = { x: 0, y: 0 };
    let faceState = { detected: 0, centered: 0, count: 0, width: 0, height: 0, confidence: 0, symmetry: 0 };
    let player = null;
    let isRecording = false;
    let faceDetector = null;
    let currentPointIndex = 0;
    let clickCount = 0;
    let canClick = false;

    async function initFace() {
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
        faceDetector = await FaceDetector.createFromOptions(vision, {
            baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite" },
            runningMode: "VIDEO", minDetectionConfidence: 0.5
        });
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        document.getElementById('camVideo').srcObject = stream;
        document.getElementById('init-msg').innerText = "Ready.";
        document.getElementById('startBtn').style.display = "block";
        startFaceLoop();
    }

    function startFaceLoop() {
        const video = document.getElementById('camVideo');
        function detect() {
            if (video.readyState >= 2) {
                const result = faceDetector.detectForVideo(video, performance.now());
                const detections = result.detections || [];
                if (detections.length > 0) {
                    const d = detections[0];
                    let sym = 1.0;
                    if (d.keypoints && d.keypoints.length >= 3) {
                        const distR = Math.hypot(d.keypoints[2].x - d.keypoints[0].x, d.keypoints[2].y - d.keypoints[0].y);
                        const distL = Math.hypot(d.keypoints[2].x - d.keypoints[1].x, d.keypoints[2].y - d.keypoints[1].y);
                        sym = Math.min(distL, distR) / Math.max(distL, distR);
                    }
                    faceState = { detected: 1, count: detections.length, width: Math.round(d.boundingBox.width), height: Math.round(d.boundingBox.height), confidence: d.categories[0].score.toFixed(3), symmetry: sym.toFixed(3), centered: (d.keypoints[2].x > 0.3 && d.keypoints[2].x < 0.7) ? 1 : 0 };
                } else {
                    faceState = { detected: 0, centered: 0, count: 0, width: 0, height: 0, confidence: 0, symmetry: 0 };
                }
            }
            requestAnimationFrame(detect);
        }
        detect();
    }

    window.initExperience = async function() {
        document.getElementById('overlay').style.display = 'none';
        await webgazer.setRegression('ridge').setGazeListener((data) => { if (data) currentGaze = { x: data.x, y: data.y }; }).begin();
        webgazer.showVideo(false).showPredictionPoints(true);
        document.getElementById('game-area').style.display = 'block';
        spawnPoint();
    };

    function spawnPoint() {
        const area = document.getElementById('game-area');
        area.querySelectorAll('.fish-target').forEach(el => el.remove());
        const pts = [[15,15],[85,15],[50,50],[15,85],[85,85]];
        if (currentPointIndex >= pts.length) { triggerCountdown(); return; }
        const [x, y] = pts[currentPointIndex];
        const t = document.createElement('div');
        t.className = 'fish-target fish-red'; t.innerHTML = '🐠';
        t.style.left = x + "%"; t.style.top = y + "%";
        setTimeout(() => { t.classList.remove('fish-red'); t.classList.add('fish-blue'); canClick = true; }, 600);
        t.onclick = () => { if (canClick) { clickCount++; if (clickCount >= 3) { clickCount = 0; currentPointIndex++; canClick = false; spawnPoint(); } } };
        area.appendChild(t);
    }

    function triggerCountdown() {
        const cd = document.getElementById('countdown-overlay'); cd.style.display = 'flex';
        let c = 3;
        const itv = setInterval(() => { c--; cd.innerText = c > 0 ? c : "STARE!"; if (c < 0) { clearInterval(itv); cd.style.display = 'none'; startBoss(); } }, 1000);
    }

    function startBoss() {
        document.getElementById('boss-fish').classList.add('boss-active');
        setTimeout(() => { document.getElementById('boss-fish').classList.remove('boss-active'); document.getElementById('final-fish-display').innerText = "CALIBRATED"; document.getElementById('victory-modal').style.display = 'block'; }, 3000);
    }

    window.closeVictory = function() {
        document.getElementById('game-area').style.display = 'none';
        document.getElementById('video-area').style.display = 'block';
        webgazer.showPredictionPoints(false);
        player.playVideo();
        isRecording = true;
        setInterval(logRow, 1000);
    };

    function logRow() {
        if (!isRecording) return;
        const stage = document.getElementById('stage').getBoundingClientRect();
        const nx = (currentGaze.x - stage.left) / stage.width;
        const ny = (currentGaze.y - stage.top) / stage.height;
        csvData.push([new Date().toISOString(), SESSION_ID, PID, VID, YT_ID, player.getCurrentTime().toFixed(3), nx.toFixed(4), ny.toFixed(4), (nx >= 0 && nx <= 1 ? 1 : 0), faceState.detected, faceState.centered, faceState.count, faceState.width, faceState.height, faceState.confidence, faceState.symmetry]);
    }

    window.terminateSession = function() {
        isRecording = false;
        webgazer.pause();
        const csvContent = csvData.map(e => e.join(",")).join("\n");
        const blob = new Blob([csvContent], { type: 'text/csv' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `${PID}_${VID}_${SESSION_ID}.csv`;
        link.click();
    };

    window.onYouTubeIframeAPIReady = () => {
        player = new YT.Player('player', { videoId: YT_ID, playerVars: { controls: 0 }, events: { onStateChange: (e) => { if(e.data === 0) terminateSession(); } } });
    };

    initFace();
</script>
<script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
