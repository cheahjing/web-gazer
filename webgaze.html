<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bird Study: High-Precision Version</title>
    <script src="https://cdn.jsdelivr.net/npm/webgazer@2.1.1/dist/webgazer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f8fbff; font-family: 'Comic Sans MS', cursive, sans-serif; overflow: hidden; }
        #app-viewport { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        #stage { 
            position: relative; width: 85%; height: 80%; 
            background: #ffffff; border: 8px solid #0077be; border-radius: 25px; 
            z-index: 10; overflow: hidden; 
        }

        #webgazerVideoFeed { 
            display: block !important; position: fixed !important; 
            bottom: 20px !important; left: 20px !important; 
            width: 200px !important; height: auto !important; 
            z-index: 2147483647 !important; border: 4px solid #0077be; 
            border-radius: 15px; transform: scaleX(-1); 
        }

        /* FIXED: Force transparent background on emojis immediately */
        .fish-target, .fish-distractor { 
            position: absolute; display: flex; align-items: center; 
            justify-content: center; background: transparent !important; 
            border: none !important; outline: none !important; 
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        .fish-target { width: 100px; height: 100px; cursor: pointer; z-index: 1000; transform: translate(-50%, -50%); font-size: 60px; }
        .fish-distractor { width: 70px; height: 70px; z-index: 999; transform: translate(-50%, -50%); font-size: 40px; opacity: 0.3; pointer-events: none; }

        #video-area, #player { width: 100%; height: 100%; }
        #game-instr { position: absolute; top: 15px; width: 100%; text-align: center; font-size: 24px; color: #0077be; z-index: 1100; font-weight: bold; }
        
        #debug-bar { position: fixed; top: 0; width: 100%; background: #333; color: white; padding: 10px 20px; z-index: 2147483646; display: flex; gap: 30px; }
        #overlay { position: fixed; inset: 0; background: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2147483645; text-align: center; padding: 40px; }
        .btn { padding: 20px 60px; font-size: 1.5rem; cursor: pointer; background: #0077be; color: white; border: none; border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body>

<div id="debug-bar">
    <span>PID: <span id="disp-pid"></span></span>
    <span>Score: <b id="disp-score">0%</b></span>
    <button onclick="finishSession()" style="margin-left:auto;">End & Save</button>
</div>

<div id="app-viewport">
    <div id="stage">
        <div id="game-area" style="display:none; width:100%; height:100%; background:#ffffff; position:relative;">
            <div id="game-instr">Click the <b>GOLD FISH 🐠</b> 3 times at each spot!</div>
            <div id="validation-box" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center;">
                <div style="font-size:100px; background:none;">🎯</div>
                <p style="font-size:1.5rem; color:#0077be;">Keep looking at the center!</p>
            </div>
        </div>
        <div id="video-area" style="display:none;"><div id="player"></div></div>
    </div>

    <div id="overlay">
        <h1 style="color:#0077be;">🐦 Bird Discovery Game</h1>
        <p>Tip: Keep your head very still and your face well-lit!</p>
        <button class="btn" onclick="initExperience()">START CALIBRATION</button>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const PID = params.get("pid") || "P001";
    const YT_ID = params.get("yt") || "905QNpTukIU";
    document.getElementById('disp-pid').innerText = PID;

    let csvData = [["timestamp", "event", "video_time", "norm_x", "norm_y", "on_screen", "calib_score"]];
    let currentGaze = { x: 0, y: 0 };
    let player = null;
    let isRecording = false;
    let calibScore = 0;

    const points = [[15,15],[50,15],[85,15],[15,50],[50,50],[85,50],[15,85],[50,85],[85,85]];
    let currentPointIndex = 0;
    let clickCount = 0;

    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
    window.onYouTubeIframeAPIReady = () => {
        player = new YT.Player('player', { videoId: YT_ID, width: '100%', height: '100%', playerVars: { controls: 0, disablekb: 1, rel: 0, modestbranding: 1 } });
    };

    async function initExperience() {
        document.getElementById('overlay').style.display = 'none';
        
        // Added smoothing: Threads 10 samples together to reduce "zooming"
        await webgazer.setRegression('ridge')
            .setTracker('clmtrackr') // More stable for simple setups
            .setGazeListener((data) => {
                if (data) {
                    currentGaze.x = data.x;
                    currentGaze.y = data.y;
                }
            }).begin();
            
        webgazer.showVideo(true).showPredictionPoints(true);
        document.getElementById('game-area').style.display = 'block';
        spawnPoint();
    }

    function spawnPoint() {
        const area = document.getElementById('game-area');
        area.querySelectorAll('.fish-target, .fish-distractor').forEach(el => el.remove());
        if (currentPointIndex >= points.length) { runValidation(); return; }

        const [x, y] = points[currentPointIndex];
        for (let i = 0; i < 4; i++) {
            const d = document.createElement('div'); d.className = 'fish-distractor'; d.innerHTML = '🌊';
            d.style.left = (x + (Math.random()*25-12.5)) + "%"; d.style.top = (y + (Math.random()*25-12.5)) + "%";
            area.appendChild(d);
        }
        
        const t = document.createElement('div'); 
        t.className = 'fish-target'; 
        t.innerHTML = '🐠';
        t.style.left = x + "%"; 
        t.style.top = y + "%";
        
        t.onclick = () => {
            clickCount++;
            if (clickCount >= 3) { 
                clickCount = 0; 
                currentPointIndex++; 
                spawnPoint(); 
            } else { 
                t.style.transform = `translate(-50%, -50%) scale(${1 + clickCount * 0.4})`; 
            }
        };
        area.appendChild(t);
    }

    function runValidation() {
        document.getElementById('game-instr').innerHTML = "<b>Almost there! Look at the target...</b>";
        document.getElementById('validation-box').style.display = 'block';
        
        let samples = [];
        const stageBox = document.getElementById('stage').getBoundingClientRect();
        const targetX = stageBox.left + (stageBox.width / 2);
        const targetY = stageBox.top + (stageBox.height / 2);

        const checkInterval = setInterval(() => {
            const dist = Math.sqrt(Math.pow(currentGaze.x - targetX, 2) + Math.pow(currentGaze.y - targetY, 2));
            samples.push(dist);
        }, 100);

        setTimeout(() => {
            clearInterval(checkInterval);
            const avgDist = samples.reduce((a, b) => a + b, 0) / samples.length;
            // 100px error = 80%, 200px error = 60%, etc.
            calibScore = Math.max(0, Math.min(100, 100 - (avgDist / 5))); 
            document.getElementById('disp-score').innerText = Math.round(calibScore) + "%";
            
            if (calibScore < 50) {
                alert("The tracking is a bit lost. Let's try again! (Tips: Still head, bright room)");
                location.reload();
            } else {
                document.getElementById('game-area').style.display = 'none';
                startVideo();
            }
        }, 4000);
    }

    function startVideo() {
        document.getElementById('video-area').style.display = 'block';
        player.playVideo();
        isRecording = true;
        setInterval(() => {
            if (isRecording) {
                const stageBox = document.getElementById('stage').getBoundingClientRect();
                const vTime = player.getCurrentTime ? player.getCurrentTime().toFixed(2) : 0;
                const normX = (currentGaze.x - stageBox.left) / stageBox.width;
                const normY = (currentGaze.y - stageBox.top) / stageBox.height;
                const onScreen = (currentGaze.x >= 0 && currentGaze.x <= window.innerWidth && currentGaze.y >= 0 && currentGaze.y <= window.innerHeight) ? 1 : 0;
                csvData.push([new Date().toISOString(), "video", vTime, normX.toFixed(4), normY.toFixed(4), onScreen, calibScore.toFixed(1)]);
            }
        }, 1000);
    }

    function finishSession() {
        isRecording = false;
        webgazer.pause();
        const csvContent = csvData.map(e => e.join(",")).join("\n");
        const blob = new Blob([csvContent], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `BIRDS_${PID}.csv`; a.click();
    }
</script>
</body>
</html>
