<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bird Study: Fish Game Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/webgazer@2.1.1/dist/webgazer.min.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #e0f7fa; font-family: 'Comic Sans MS', cursive, sans-serif; overflow: hidden; }
        
        #app-viewport {
            position: relative; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* The main stage where video and game happen */
        #stage {
            position: relative; width: 80%; height: 75%;
            background: #ffffff; border: 8px solid #4fc3f7; border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 10; overflow: hidden;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* Webcam Feed: Bottom Left & Always on Top */
        #webgazerVideoFeed {
            display: block !important;
            position: fixed !important;
            bottom: 20px !important;
            left: 20px !important;
            top: auto !important; /* Override webgazer default */
            width: 180px !important;
            height: auto !important;
            z-index: 10000 !important;
            border: 4px solid #fff;
            border-radius: 15px;
            transform: scaleX(-1);
        }

        /* Fish Game Elements */
        .fish {
            position: absolute; width: 60px; height: 40px; 
            cursor: pointer; z-index: 500; transition: transform 0.2s;
            display: flex; align-items: center; justify-content: center; font-size: 30px;
        }

        #game-instr {
            position: absolute; top: 20px; width: 100%; text-align: center;
            font-size: 24px; color: #01579b; z-index: 600;
        }

        /* Debug Bar */
        #debug-bar {
            position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.8);
            color: white; padding: 8px 20px; z-index: 10001; display: flex; gap: 20px;
        }
        .status-on { color: #00ff00; font-weight: bold; }
        .status-off { color: #ff4444; font-weight: bold; }

        #overlay {
            position: fixed; inset: 0; background: #e1f5fe;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000;
        }

        .btn {
            padding: 20px 50px; font-size: 1.5rem; cursor: pointer;
            background: #ff7043; color: white; border: none; border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>

<div id="debug-bar">
    <span>PID: <span id="disp-pid"></span></span>
    <span>Gaze: <span id="disp-gaze">--</span></span>
    <span>Screen: <span id="disp-screen">--</span></span>
</div>

<div id="app-viewport">
    <div id="stage">
        <div id="game-area" style="display:none; width:100%; height:100%; background:#81d4fa; position:relative;">
            <div id="game-instr">Catch the <b>RED FISH</b> 5 times! 🐟</div>
        </div>
        
        <div id="video-area" style="display:none; width:100%; height:100%;">
            <div id="player"></div>
        </div>
    </div>

    <div id="overlay">
        <h1>Welcome to the Bird Discovery!</h1>
        <p>Parents: Please ensure the child's face is visible in the bottom-left camera.</p>
        <button class="btn" onclick="initExperience()">Start Game!</button>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const PID = params.get("pid") || "P001";
    const YT_ID = params.get("yt") || "905QNpTukIU";
    
    document.getElementById('disp-pid').innerText = PID;

    let csvData = [["timestamp", "event", "video_time", "norm_x", "norm_y", "on_screen"]];
    let currentGaze = { x: 0, y: 0 };
    let player = null;
    let isRecording = false;

    // YouTube Setup
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
    window.onYouTubeIframeAPIReady = () => {
        player = new YT.Player('player', {
            videoId: YT_ID,
            playerVars: { controls: 0, disablekb: 1, modestbranding: 1, rel: 0 }
        });
    };

    async function initExperience() {
        document.getElementById('overlay').style.display = 'none';
        
        await webgazer.setRegression('ridge')
            .setGazeListener((data) => {
                if (!data) return;
                currentGaze = { x: data.x, y: data.y };
                updateSystem();
            }).begin();

        webgazer.showVideo(true).showPredictionPoints(true);
        startFishGame();
    }

    // --- CALIBRATION GAME ---
    let fishCaught = 0;
    function startFishGame() {
        document.getElementById('game-area').style.display = 'block';
        spawnFish();
    }

    function spawnFish() {
        const area = document.getElementById('game-area');
        area.querySelectorAll('.fish').forEach(f => f.remove());

        // Spawn 4 distraction "Blue Fish"
        for(let i=0; i<4; i++) createFish(false);
        // Spawn 1 target "Red Fish"
        createFish(true);
    }

    function createFish(isTarget) {
        const f = document.createElement('div');
        f.className = 'fish';
        f.innerHTML = isTarget ? '🍎' : '💧'; // Using emojis for simplicity, could be fish icons
        if(isTarget) f.style.filter = "hue-rotate(0deg)";
        
        f.style.left = (Math.random() * 80 + 10) + "%";
        f.style.top = (Math.random() * 70 + 15) + "%";

        f.onclick = () => {
            if(isTarget) {
                fishCaught++;
                if(fishCaught >= 5) {
                    document.getElementById('game-area').style.display = 'none';
                    startVideo();
                } else {
                    spawnFish();
                }
            }
        };
        document.getElementById('game-area').appendChild(f);
    }

    // --- EXPERIMENT PHASE ---
    function startVideo() {
        document.getElementById('video-area').style.display = 'block';
        player.playVideo();
        isRecording = true;

        setInterval(() => {
            if (isRecording) {
                const stageBox = document.getElementById('stage').getBoundingClientRect();
                const vTime = player.getCurrentTime ? player.getCurrentTime().toFixed(2) : 0;

                const normX = (currentGaze.x - stageBox.left) / stageBox.width;
                const normY = (currentGaze.y - stageBox.top) / stageBox.height;
                const onScreen = (currentGaze.x >= 0 && currentGaze.x <= window.innerWidth && 
                                  currentGaze.y >= 0 && currentGaze.y <= window.innerHeight) ? 1 : 0;

                csvData.push([new Date().toISOString(), "video", vTime, normX.toFixed(4), normY.toFixed(4), onScreen]);
            }
        }, 1000);
    }

    function updateSystem() {
        // Update Debug Text
        document.getElementById('disp-gaze').innerText = `${Math.round(currentGaze.x)}, ${Math.round(currentGaze.y)}`;
        
        const onScreen = (currentGaze.x >= 0 && currentGaze.x <= window.innerWidth && 
                          currentGaze.y >= 0 && currentGaze.y <= window.innerHeight);
        
        const screenSpan = document.getElementById('disp-screen');
        screenSpan.innerText = onScreen ? "ON SCREEN" : "OFF SCREEN";
        screenSpan.className = onScreen ? "status-on" : "status-off";
    }

    function finishSession() {
        isRecording = false;
        webgazer.pause();
        const csvContent = csvData.map(e => e.join(",")).join("\n");
        const blob = new Blob([csvContent], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `BIRDS_${PID}.csv`;
        a.click();
    }
</script>

</body>
</html>
