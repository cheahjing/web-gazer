<script>
    // ... (Keep same Init/Spawn logic) ...

    function triggerCountdown() {
        const cdOverlay = document.getElementById('countdown-overlay');
        document.getElementById('game-instr').innerHTML = "<b>Get ready for the Boss!</b>";
        cdOverlay.style.display = 'flex';
        
        let count = 3;
        const timer = setInterval(() => {
            count--;
            if (count > 0) {
                cdOverlay.innerText = count;
            } else if (count === 0) {
                cdOverlay.innerText = "STARE!"; // Positioned at center
            } else {
                clearInterval(timer);
                cdOverlay.style.display = 'none';
                startBossBattle();
            }
        }, 1000);
    }

    function startBossBattle() {
        const boss = document.getElementById('boss-fish');
        document.getElementById('game-instr').innerHTML = "<b>DON'T LOOK AWAY!</b>";
        boss.classList.add('boss-active');
        
        let samples = [];
        const stageBox = document.getElementById('stage').getBoundingClientRect();
        const targetX = stageBox.left + (stageBox.width / 2);
        const targetY = stageBox.top + (stageBox.height / 2);

        // Added a 500ms delay to let eyes settle before sampling starts
        setTimeout(() => {
            const checkInterval = setInterval(() => {
                const dist = Math.sqrt(Math.pow(currentGaze.x - targetX, 2) + Math.pow(currentGaze.y - targetY, 2));
                samples.push(dist);
            }, 100);

            setTimeout(() => {
                clearInterval(checkInterval);
                const avgDist = samples.reduce((a, b) => a + b, 0) / samples.length;
                
                // Keep the 4.5 coefficient but apply it to the settled samples
                finalAccuracy = Math.max(0, Math.min(100, 100 - (avgDist / 4.5))); 
                boss.classList.remove('boss-active');

                if (finalAccuracy < 70 && !isBonusRound) {
                    isBonusRound = true;
                    currentPointIndex = 0;
                    document.getElementById('game-instr').innerHTML = "<b>🌟 BONUS ROUND! Catch 4 more! 🌟</b>";
                    spawnPoint();
                } else {
                    showVictoryPopup();
                }
            }, 4000);
        }, 500); 
    }
    // ... (Keep rest of script same) ...
</script>
