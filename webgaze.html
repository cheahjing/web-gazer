<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gaze Logger - Compatibility Mode</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <script src="https://webgazer.cs.brown.edu/webgazer.js"></script>

    <style>
        body { margin: 0; background: black; color: white; font-family: system-ui; overflow: hidden; }
        #videoPane { position: relative; width: 100vw; height: 100vh; }
        #player { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
        #overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); z-index: 2000; text-align: center; }
        .calibration-point { position: absolute; width: 25px; height: 25px; background: #ff3355; border-radius: 50%; cursor: pointer; border: 3px solid white; display: none; z-index: 3000; transform: translate(-50%, -50%); }
        #debug { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; font-size: 12px; border-radius: 8px; z-index: 900; pointer-events: none; }
        #stopBtn { position: absolute; top: 20px; right: 20px; background: #ff3355; color: white; padding: 12px 20px; border: none; border-radius: 6px; display: none; z-index: 2500; font-weight: bold; cursor: pointer; }
    </style>
</head>

<body>
    <div id="videoPane">
        <div id="player"></div>
        <div id="overlay">
            <div id="setupContent">
                <h2>Gaze Tracker (Safe Mode)</h2>
                <p>1. Allow Camera Access.<br>2. Wait for the green box on your face.<br>3. Click 5 times on each red dot.</p>
                <button id="initBtn" style="padding: 15px 30px; font-size: 1.2rem; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px;">Start Tracker</button>
            </div>
        </div>
        <button id="stopBtn">⏹ Stop & Save CSV</button>
        <div id="debug">System Ready</div>
        
        <div class="calibration-point" id="pt1" style="top: 15%; left: 15%;"></div>
        <div class="calibration-point" id="pt2" style="top: 15%; left: 50%;"></div>
        <div class="calibration-point" id="pt3" style="top: 15%; left: 85%;"></div>
        <div class="calibration-point" id="pt4" style="top: 50%; left: 15%;"></div>
        <div class="calibration-point" id="pt5" style="top: 50%; left: 50%;"></div>
        <div class="calibration-point" id="pt6" style="top: 50%; left: 85%;"></div>
        <div class="calibration-point" id="pt7" style="top: 85%; left: 15%;"></div>
        <div class="calibration-point" id="pt8" style="top: 85%; left: 50%;"></div>
        <div class="calibration-point" id="pt9" style="top: 85%; left: 85%;"></div>
    </div>

    <script>
        const params = new URLSearchParams(location.search);
        const PID = params.get("pid") || "P001";
        const VID = params.get("vid") || "V01";
        const YT_ID = params.get("yt") || "";
        
        let csvData = [["timestamp", "video_time", "gaze_x", "gaze_y", "on_screen"]];
        let currentGaze = { x: 0, y: 0 };
        let isTracking = false;
        let player = null;

        // YouTube
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);
        window.onYouTubeIframeAPIReady = () => {
            player = new YT.Player('player', {
                videoId: YT_ID,
                playerVars: { controls: 0, disablekb: 1, rel: 0, playsinline: 1 }
            });
        };

        document.getElementById('initBtn').onclick = async function() {
            this.style.display = 'none';
            document.getElementById('debug').innerText = "Waking up camera...";

            // SWITCH TRACKER TO CLMTRACKR (More stable for GH Pages)
            webgazer.setTracker("clmtrackr");
            webgazer.setRegression("ridge");

            await webgazer.setGazeListener((data, elapsedTime) => {
                if (data) {
                    currentGaze = { x: data.x, y: data.y };
                    updateDebug();
                }
            })
            .showVideoPreview(true)
            .showFaceOverlay(true)
            .begin();

            // Wait for tracker to find face
            const checkReady = setInterval(() => {
                if (webgazer.isReady()) {
                    clearInterval(checkReady);
                    document.getElementById('overlay').style.display = 'none';
                    startCalibration();
                }
            }, 500);
        };

        // Calibration
        let currentPt = 1;
        let clicks = 0;
        function startCalibration() { nextPoint(); }

        function nextPoint() {
            const pt = document.getElementById(`pt${currentPt}`);
            if (pt) {
                pt.style.display = "block";
                pt.onclick = () => {
                    clicks++;
                    if (clicks >= 5) {
                        pt.style.display = "none";
                        clicks = 0;
                        currentPt++;
                        nextPoint();
                    } else {
                        pt.style.background = (clicks % 2 === 0) ? "#ff3355" : "#00ff88";
                    }
                };
            } else {
                startRecording();
            }
        }

        function startRecording() {
            document.getElementById('stopBtn').style.display = "block";
            player.playVideo();
            isTracking = true;
            setInterval(() => {
                if (isTracking && player.getPlayerState() === 1) {
                    const onScreen = (currentGaze.x >= 0 && currentGaze.x <= window.innerWidth && currentGaze.y >= 0 && currentGaze.y <= window.innerHeight) ? 1 : 0;
                    csvData.push([new Date().toISOString(), player.getCurrentTime().toFixed(3), Math.round(currentGaze.x), Math.round(currentGaze.y), onScreen]);
                }
            }, 1000);
        }

        function updateDebug() {
            document.getElementById('debug').innerHTML = `X: ${Math.round(currentGaze.x)} | Y: ${Math.round(currentGaze.y)}`;
        }

        function downloadCSV() {
            const csvContent = csvData.map(e => e.join(",")).join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `SAFE_WG_${PID}_${VID}.csv`;
            a.click();
        }

        document.getElementById('stopBtn').onclick = () => {
            isTracking = false;
            webgazer.pause();
            downloadCSV();
        };
    </script>
</body>
</html>
