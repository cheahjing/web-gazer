<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gaze Logger - WebGazer Edition</title>
  <script src="https://webgazer.cs.brown.edu/webgazer.js"></script>

  <style>
    body { margin: 0; background: black; color: white; font-family: system-ui; overflow: hidden; }
    #layout { display: flex; width: 100vw; height: 100vh; }
    #videoPane { flex: 1; position: relative; }
    #player { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
    
    /* Overlay Styles */
    #overlay { 
      position: absolute; inset: 0; display: flex; align-items: center; 
      justify-content: center; background: rgba(0,0,0,0.9); z-index: 2000; text-align: center; 
    }
    
    /* Calibration Styles */
    .calibration-point {
      position: absolute; width: 20px; height: 20px; background: #ff3355;
      border-radius: 50%; cursor: pointer; border: 2px solid white;
      display: none; z-index: 3000; transform: translate(-50%, -50%);
    }

    #debug {
      position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6);
      padding: 8px; font-size: 12px; border-radius: 8px; z-index: 900; pointer-events: none;
    }

    #stopBtn {
      position: absolute; top: 20px; right: 20px; background: #ff3355; color: white;
      padding: 10px 18px; border: none; border-radius: 6px; display: none; z-index: 1000;
    }

    /* Adjust WebGazer's built-in video preview position */
    #webgazerVideoFeed { top: 10px !important; left: auto !important; right: 10px !important; }
    #webgazerFaceOverlay { top: 10px !important; left: auto !important; right: 10px !important; }
  </style>
</head>

<body>
  <div id="layout">
    <div id="videoPane">
      <div id="player"></div>
      
      <div id="overlay">
        <div id="setupContent">
          <h2>Gaze Calibration</h2>
          <p>We need to calibrate the tracker first.<br>Click the <b>9 red dots</b> that will appear on the screen.</p>
          <button id="initBtn" style="padding:10px 20px; font-size:1.2em;">Begin Calibration</button>
        </div>
      </div>

      <button id="stopBtn">⏹ Stop & Save</button>
      <div id="debug">Initializing WebGazer...</div>
      
      <div class="calibration-point" id="pt1" style="top: 10%; left: 10%;"></div>
      <div class="calibration-point" id="pt2" style="top: 10%; left: 50%;"></div>
      <div class="calibration-point" id="pt3" style="top: 10%; left: 90%;"></div>
      <div class="calibration-point" id="pt4" style="top: 50%; left: 10%;"></div>
      <div class="calibration-point" id="pt5" style="top: 50%; left: 50%;"></div>
      <div class="calibration-point" id="pt6" style="top: 50%; left: 90%;"></div>
      <div class="calibration-point" id="pt7" style="top: 90%; left: 10%;"></div>
      <div class="calibration-point" id="pt8" style="top: 90%; left: 50%;"></div>
      <div class="calibration-point" id="pt9" style="top: 90%; left: 90%;"></div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const PID = params.get("pid") || "P001";
    const VID = params.get("vid") || "V01";
    const YT_ID = params.get("yt") || "";
    const SESSION_ID = "gazer_" + Date.now();

    let csvData = [["timestamp", "session_id", "participant_id", "video_id", "video_time", "gaze_x", "gaze_y", "on_screen"]];
    let player = null;
    let calibrationClicks = 0;
    let currentGaze = { x: 0, y: 0 };
    let isTracking = false;

    // Initialize YouTube
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    window.onYouTubeIframeAPIReady = () => {
      player = new YT.Player('player', {
        videoId: YT_ID,
        playerVars: { controls: 0, disablekb: 1, rel: 0, playsinline: 1 },
        events: { onStateChange: (e) => { if(e.data === YT.PlayerState.ENDED) finishSession(); } }
      });
    };

    // Initialize WebGazer
    document.getElementById('initBtn').addEventListener('click', async () => {
      document.getElementById('setupContent').innerHTML = "<p>Wait for the camera...</p>";
      
      await webgazer.setGazeListener((data, elapsedTime) => {
        if (data) {
          currentGaze = { x: data.x, y: data.y };
          updateDebug();
        }
      }).showVideoPreview(true).showFaceOverlay(true).showPredictionPoints(true).begin();

      startCalibration();
    });

    function startCalibration() {
      document.getElementById('overlay').style.background = "transparent";
      document.getElementById('setupContent').style.display = "none";
      showNextPoint();
    }

    function showNextPoint() {
      calibrationClicks++;
      const pt = document.getElementById(`pt${calibrationClicks}`);
      if (pt) {
        pt.style.display = "block";
        pt.onclick = () => {
          pt.style.display = "none";
          showNextPoint();
        };
      } else {
        startVideo();
      }
    }

    function startVideo() {
      document.getElementById('overlay').style.display = "none";
      document.getElementById('stopBtn').style.display = "block";
      player.playVideo();
      isTracking = true;
      
      // Sample every 1s (matching your MediaPipe version)
      setInterval(() => {
        if (isTracking && player.getPlayerState() === 1) {
          logGaze();
        }
      }, 1000);
    }

    function logGaze() {
      const vTime = player.getCurrentTime();
      // On-screen check: Is (x,y) within the window bounds?
      const onScreen = (currentGaze.x >= 0 && currentGaze.x <= window.innerWidth && 
                        currentGaze.y >= 0 && currentGaze.y <= window.innerHeight) ? 1 : 0;

      csvData.push([
        new Date().toISOString(), SESSION_ID, PID, VID, 
        vTime.toFixed(3), Math.round(currentGaze.x), Math.round(currentGaze.y), onScreen
      ]);
    }

    function updateDebug() {
      const d = document.getElementById('debug');
      d.innerText = `PID: ${PID}\nX: ${Math.round(currentGaze.x)}, Y: ${Math.round(currentGaze.y)}\nTracking: ${isTracking ? "RUNNING" : "PAUSED"}`;
    }

    function finishSession() {
      isTracking = false;
      webgazer.pause();
      downloadCSV();
    }

    function downloadCSV() {
      const csvContent = csvData.map(e => e.join(",")).join("\n");
      const blob = new Blob([csvContent], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${PID}_${VID}_webgazer.csv`;
      a.click();
    }

    document.getElementById('stopBtn').onclick = finishSession;
  </script>
</body>
</html>
