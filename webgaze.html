<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bird Study: Research Grade Logger</title>
    <script src="https://cdn.jsdelivr.net/npm/webgazer@2.1.1/dist/webgazer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f8fbff; font-family: 'Comic Sans MS', cursive, sans-serif; overflow: hidden; }
        #app-viewport { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        #stage { position: relative; width: 85%; height: 80%; background: #ffffff; border: 8px solid #0077be; border-radius: 25px; z-index: 10; overflow: hidden; }
        #webgazerGazeDot { z-index: 2147483647 !important; border: 2px solid white !important; }
        
        /* Game UI */
        .fish-target { position: absolute; display: flex !important; align-items: center; justify-content: center; width: 120px; height: 120px; transform: translate(-50%, -50%); font-size: 70px; z-index: 1000; transition: filter 0.2s, transform 0.2s; cursor: default; background: transparent !important; outline: none !important; user-select: none; }
        .fish-red { filter: grayscale(1) sepia(1) saturate(8) hue-rotate(-50deg); opacity: 0.7; }
        .fish-blue { filter: none; opacity: 1; cursor: pointer; }
        #boss-fish { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 140px; z-index: 1200; display: none; opacity: 0; pointer-events: none; }
        .boss-active { display: flex !important; opacity: 1 !important; }
        #countdown-overlay { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(255,255,255,0.8); z-index: 1500; font-size: 150px; color: #ff4444; font-weight: bold; }
        #victory-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border: 10px solid #ffd700; border-radius: 30px; padding: 40px; text-align: center; z-index: 2000; display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
        #video-area, #player { width: 100%; height: 100%; }
        #game-instr { position: absolute; top: 15px; width: 100%; text-align: center; font-size: 24px; color: #0077be; z-index: 1100; font-weight: bold; }
        
        /* Debug Bar & Status */
        #debug-bar { position: fixed; top: 0; width: 100%; background: #333; color: white; padding: 10px 20px; z-index: 2147483646; display: flex; gap: 20px; font-family: monospace; font-size: 11px; align-items: center;}
        .status-on { color: #00ff00; font-weight: bold; } 
        .status-off { color: #ff4444; font-weight: bold; }
        
        #overlay { position: fixed; inset: 0; background: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2147483645; text-align: center; }
        #camVideo { display: none; }
    </style>
</head>
<body>

<div id="debug-bar">
    <span>PID: <b id="disp-pid">--</b></span>
    <span>Gaze: <span id="disp-screen" class="status-off">OUT</span></span>
    <span>FACE: <span id="dbgFace">--</span></span>
    <span>SYM: <span id="dbgSym">--</span></span>
    <span style="border-left: 1px solid #666; padding-left: 10px;">
        MANUAL: <span id="manual-status" class="status-on">ENGAGED (↑)</span>
    </span>
    <button onclick="terminateSession()" style="margin-left:auto; cursor:pointer; background:#ff4444; color:white; border:none; padding:4px 12px; border-radius:4px; font-weight:bold;">⏹ STOP & SAVE</button>
</div>

<div id="app-viewport">
    <div id="stage">
        <div id="game-area" style="display:none; width:100%; height:100%; background:#ffffff; position:relative;">
            <div id="game-instr">Wait for Blue... then catch it!</div>
            <div id="countdown-overlay">3</div>
            <div id="boss-fish">🦑</div>
            <div id="victory-modal">
                <div style="font-size: 100px;">🏆</div>
                <h2>GREAT JOB!</h2>
                <p style="font-size: 24px;">Quality Score: <b id="final-score-display">--</b>%</p>
                <button onclick="closeVictory()" style="padding: 15px 40px; background: #ffd700; border: none; border-radius: 20px; font-weight: bold; cursor: pointer;">WATCH BIRDS 🐦</button>
            </div>
        </div>
        <div id="video-area" style="display:none;"><div id="player"></div></div>
    </div>
    <div id="overlay">
        <h1>🌊 Research Session</h1>
        <p id="init-msg">Initializing Trackers...</p>
        <button id="startBtn" onclick="initExperience()" style="display:none; padding:20px 60px; font-size:1.5rem; cursor:pointer; background:#0077be; color:white; border:none; border-radius:50px; font-weight:bold;">START</button>
    </div>
</div>

<video id="camVideo" autoplay playsinline muted></video>

<script type="module">
    import { FaceDetector, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs";

    // --- CONFIG & SESSION ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbytdM7UB1IrDmA4qK3qdQWMR5ZXgq3xBtZyfPH4c-bEK98oq-QjbvBCUKlHnYO4HgWINw/exec";
    
    function generateSessionId() {
        const now = new Date();
        return `sess_${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, "0")}${String(now.getDate()).padStart(2, "0")}_${String(now.getHours()).padStart(2, "0")}${String(now.getMinutes()).padStart(2, "0")}_${Math.floor(Math.random() * 100)}`;
    }

    const params = new URLSearchParams(window.location.search);
    const PID = params.get("pid") || "P001";
    const VID = params.get("vid") || "V01";
    const YT_ID = params.get("yt") || "905QNpTukIU";
    const SESSION_ID = generateSessionId();
    document.getElementById('disp-pid').innerText = PID;

    // --- LOGGING DATA ---
    let csvData = [["timestamp", "session_id", "participant_id", "video_id", "youtube_id", "video_time", "gaze_x", "gaze_y", "on_screen", "face_detected", "face_centered", "face_count", "face_width", "face_height", "detection_confidence", "head_symmetry", "calibration_score", "manual_engagement"]];
    let currentGaze = { x: 0, y: 0 };
    let faceState = { detected: 0, centered: 0, count: 0, width: 0, height: 0, confidence: 0, symmetry: 0 };
    let manualEngagement = 1; // Default to engaged
    let player = null, isRecording = false, faceDetector = null, finalAccuracy = 0;
    let currentPointIndex = 0, clickCount = 0, canClick = false, isBonusRound = false;

    const points = [[15,15],[85,15],[50,15],[15,50],[50,50],[85,50],[15,85],[50,85],[85,85]];
    const bonusPoints = [[12,12], [88,12], [12,88], [88,88]];

    // --- MANUAL LOGGER KEYBOARD LISTENER ---
    window.addEventListener('keydown', (e) => {
        const display = document.getElementById('manual-status');
        if (e.key === "ArrowUp") {
            manualEngagement = 1;
            display.innerText = "ENGAGED (↑)";
            display.className = "status-on";
        } else if (e.key === "ArrowDown") {
            manualEngagement = 0;
            display.innerText = "LOOKED AWAY (↓)";
            display.className = "status-off";
        }
    });

    // --- MEDIAPIPE INIT ---
    async function init() {
        try {
            // Updated: Using a more specific resolver path to prevent MediaPipe failures
            const filesetResolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm");
            faceDetector = await FaceDetector.createFromOptions(filesetResolver, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite" },
                runningMode: "VIDEO", minDetectionConfidence: 0.5
            });
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            const camVideo = document.getElementById("camVideo");
            camVideo.srcObject = stream;
            await camVideo.play();
            document.getElementById('init-msg').innerText = "Trackers Ready.";
            document.getElementById('startBtn').style.display = "block";
            startFaceLoop();
        } catch (err) { 
            console.error(err);
            document.getElementById('init-msg').innerText = "❌ MediaPipe Error: Check your Camera or Internet."; 
        }
    }

    function startFaceLoop() {
        const video = document.getElementById('camVideo');
        function detect() {
            if (video.readyState >= 2) {
                const result = faceDetector.detectForVideo(video, performance.now());
                const detections = result?.detections || [];
                if (detections.length > 0) {
                    const d = detections[0];
                    let symmetry = 1.0;
                    if (d.keypoints && d.keypoints.length >= 3) {
                        const distR = Math.hypot(d.keypoints[2].x - d.keypoints[0].x, d.keypoints[2].y - d.keypoints[0].y);
                        const distL = Math.hypot(d.keypoints[2].x - d.keypoints[1].x, d.keypoints[2].y - d.keypoints[1].y);
                        symmetry = Math.min(distL, distR) / Math.max(distL, distR);
                    }
                    faceState = { detected: 1, count: detections.length, width: Math.round(d.boundingBox.width), height: Math.round(d.boundingBox.height), confidence: d.categories[0].score.toFixed(3), symmetry: symmetry.toFixed(3), centered: (d.keypoints[2].x > 0.3 && d.keypoints[2].x < 0.7) ? 1 : 0 };
                    document.getElementById('dbgFace').innerText = "YES"; document.getElementById('dbgSym').innerText = faceState.symmetry;
                } else { faceState.detected = 0; document.getElementById('dbgFace').innerText = "NO"; }
            }
            requestAnimationFrame(detect);
        }
        detect();
    }

    // --- CALIBRATION & GAME ---
    window.initExperience = async function() {
        document.getElementById('overlay').style.display = 'none';
        await webgazer.setRegression('ridge').setGazeListener((data) => {
            if (data) { currentGaze = { x: data.x, y: data.y }; updateOnScreenStatus(); }
        }).begin();
        webgazer.showVideo(false).showPredictionPoints(true);
        document.getElementById('game-area').style.display = 'block';
        spawnPoint();
    };

    function updateOnScreenStatus() {
        const onScreen = (currentGaze.x >= 0 && currentGaze.x <= window.innerWidth && currentGaze.y >= 0 && currentGaze.y <= window.innerHeight);
        const span = document.getElementById('disp-screen');
        span.innerText = onScreen ? "IN" : "OUT"; span.className = onScreen ? "status-on" : "status-off";
    }

    function spawnPoint() {
        const area = document.getElementById('game-area');
        area.querySelectorAll('.fish-target').forEach(el => el.remove());
        const activePoints = isBonusRound ? bonusPoints : points;
        if (currentPointIndex >= activePoints.length) {
            if (!isBonusRound) triggerCountdown(); else showVictoryPopup();
            return;
        }
        const [x, y] = activePoints[currentPointIndex];
        const t = document.createElement('div');
        t.className = 'fish-target fish-red'; t.innerHTML = '🐠';
        t.style.left = x + "%"; t.style.top = y + "%";
        setTimeout(() => { t.classList.remove('fish-red'); t.classList.add('fish-blue'); canClick = true; }, 600);
        t.onclick = () => { if (!canClick) return; clickCount++; if (clickCount >= 3) { clickCount = 0; currentPointIndex++; canClick = false; spawnPoint(); } else { t.style.transform = `translate(-50%, -50%) scale(${1 + clickCount * 0.3})`; } };
        area.appendChild(t);
    }

    function triggerCountdown() {
        const cd = document.getElementById('countdown-overlay');
        cd.style.display = 'flex'; let c = 3;
        const itv = setInterval(() => { c--; if (c > 0) cd.innerText = c; else if (c === 0) cd.innerText = "STARE!"; else { clearInterval(itv); cd.style.display = 'none'; startBoss(); } }, 1000);
    }

    function startBoss() {
        const boss = document.getElementById('boss-fish');
        boss.classList.add('boss-active');
        let samples = [];
        const stageBox = document.getElementById('stage').getBoundingClientRect();
        const targetX = stageBox.left + (stageBox.width / 2);
        const targetY = stageBox.top + (stageBox.height / 2);
        const checkInterval = setInterval(() => { samples.push(Math.sqrt(Math.pow(currentGaze.x - targetX, 2) + Math.pow(currentGaze.y - targetY, 2))); }, 100);
        setTimeout(() => {
            clearInterval(checkInterval);
            const avgDist = samples.reduce((a, b) => a + b, 0) / samples.length;
            finalAccuracy = Math.max(0, Math.min(100, 100 - (avgDist / 4.5))); 
            boss.classList.remove('boss-active');
            if (finalAccuracy < 70 && !isBonusRound) { isBonusRound = true; currentPointIndex = 0; spawnPoint(); } 
            else { showVictoryPopup(); }
        }, 4000);
    }

    function showVictoryPopup() {
        document.getElementById('game-instr').style.display = 'none';
        document.getElementById('final-score-display').innerText = Math.round(finalAccuracy);
        document.getElementById('victory-modal').style.display = 'block';
    }

    // --- VIDEO & RECORDING ---
    window.closeVictory = function() {
        document.getElementById('game-area').style.display = 'none';
        document.getElementById('video-area').style.display = 'block';
        if (window.webgazer) webgazer.showPredictionPoints(false);
        if (player && typeof player.playVideo === 'function') {
            player.playVideo();
            isRecording = true;
            setInterval(logRow, 1000);
        }
    };

    function logRow() {
        if (!isRecording || !player) return;
        try {
            const stage = document.getElementById('stage').getBoundingClientRect();
            const nx = (currentGaze.x - stage.left) / stage.width;
            const ny = (currentGaze.y - stage.top) / stage.height;
            let vTime = -1;
            try { vTime = player.getCurrentTime(); } catch(e) {}

            csvData.push([
                new Date().toISOString(), SESSION_ID, PID, VID, YT_ID,
                vTime.toFixed(3), nx.toFixed(4), ny.toFixed(4),
                (nx >= 0 && nx <= 1 && ny >= 0 && ny <= 1 ? 1 : 0),
                faceState.detected, faceState.centered, faceState.count,
                faceState.width, faceState.height, faceState.confidence, faceState.symmetry,
                finalAccuracy.toFixed(1),
                manualEngagement
            ]);
        } catch (err) { console.error(err); }
    }

    window.terminateSession = function() {
        if (!isRecording) return;
        isRecording = false; 
        if(window.webgazer) webgazer.pause();
        const csvContent = csvData.map(e => e.join(",")).join("\n");
        
        // Backup: Local Download
        const blob = new Blob([csvContent], { type: 'text/csv' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `${PID}_${VID}_${SESSION_ID}.csv`;
        link.click();

        // Primary: Sync to Google Drive
        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: csvContent
        }).then(() => {
            alert("Data successfully saved to Google Drive!");
        }).catch(err => {
            console.error("G-Drive Sync Error:", err);
            alert("Cloud sync failed. Local backup downloaded.");
        });
    };

    window.onYouTubeIframeAPIReady = function() {
        player = new YT.Player('player', {
            videoId: YT_ID,
            playerVars: { 'controls': 0, 'disablekb': 1, 'rel': 0, 'modestbranding': 1 },
            events: { 'onStateChange': (e) => { if(e.data === 0) terminateSession(); } }
        });
    };

    init();
</script>
<script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
